# A generic, single database configuration.

[alembic]
script_location = alembic
prepend_sys_path = .
# NOTE: This URL is overridden in env.py from settings.DIRECT_URL.
# It exists here only to satisfy Alembic's config parser; it is never used.
sqlalchemy.url = postgresql+psycopg2://placeholder:placeholder@localhost:5432/postgres

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
